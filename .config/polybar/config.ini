; colors
include-file = ~/.config/polybar/themes/onedark.ini


[bar/mybar]
bottom = true
width = 100%
height = 28pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 2

;separator = |  
separator-foreground = ${colors.indicator}

font-0 = "Roboto:size=11:style=medium;2"
font-1 = "MesloLGS NF:size=11;2"
font-2 = "DejaVu Sans Mono wifi ramp:size=11"

modules-left = xworkspaces
modules-center = date
modules-right = xkeyboard pulseaudio battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 2

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true



[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.indicator}
label-active-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2



[module/xwindow]
type = internal/xwindow
format = <label>
label = %title:0:45s:...%



[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /1

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}



[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false

format-volume = <ramp-volume> <label-volume>
ramp-volume-foreground = ${colors.foreground}

label-volume = %percentage%%

label-muted = Ô™Ä Muted
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = Ô©ĺ 
ramp-volume-1 = Ô©Ņ
ramp-volume-2 = Ô©Ņ
ramp-volume-3 = Ô©Ņ
ramp-volume-4 = Ô©Ņ
ramp-volume-5 = Ô©Ĺ
ramp-volume-6 = Ô©Ĺ
ramp-volume-7 = Ô©Ĺ
ramp-volume-8 = Ô©Ĺ
ramp-volume-9 = Ô©Ĺ
ramp-volume-10 = ÔÄ® 

click-right = pavucontrol

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
format-prefix =  "ÔĄú  "
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.yellow}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
label = %percentage_used:2%%



[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ÔĎ£ "
label = %percentage:2%%

[network-base]
type = internal/network
interval = 1
;format-connected = <label-connected>
;format-disconnected = <label-disconnected>
;label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected
;label-disconnected =

[module/wlan]
inherit = network-base
interface-type = wireless

;label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
label-connected = %essid%
;label-disconnected = ÓÉö
label-disconnected =

format-connected = <ramp-signal> <label-connected>
format-disconnected = <label-disconnected>

ramp-signal-0 = ÓÉē
ramp-signal-1 = ÓÉē
ramp-signal-2 = ÓÉĖ
ramp-signal-3 = ÓÉó
ramp-signal-4 = ÓÉė
ramp-signal-5 = ÓÉô

[module/eth]
inherit = network-base
interface-type = wired

;label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%
label-connected = %{A3:nm-applet:} ETH %{A}
label-disconnected =

format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/date]
type = internal/date
interval = 1

date = %A %I:%M %p 
date-alt = %A,  %B %d,  %Y

label = %date%
label-foreground = ${colors.foreground}

format = %{A3:gnome-calendar:} <label> %{A}
# format-prefix = "ÔÄó" 
format-prefix-foreground = ${colors.foreground}

click-right = gnome-calendar

[settings]
screenchange-reload = true
pseudo-transparency = true



[module/battery]
type = internal/battery

full-at = 100
low-at = 35

battery = BAT1
adapter = ACAD

; plugged icon Ôá¶
format-charging = <animation-charging>   <label-charging>
format-discharging = <ramp-capacity>   <label-discharging>

label-charging = %percentage%%
label-discharging = %percentage%%

format-full = <label-full>
format-full-prefix = "ÔČÄ   "
format-full-prefix-foreground = ${colors.foreground}   
format-low = <label-low> <ramp-capacity>

label-full = %percentage%%
label-low = %percentage%%

; Only applies if <ramp-capacity> is used
ramp-capacity-0 = ÔČĄ 
ramp-capacity-1 = ÔČÉ 
ramp-capacity-2 = ÔČÉ 
ramp-capacity-3 = ÔČÉ 
ramp-capacity-4 = ÔČā 
ramp-capacity-5 = ÔČā 
ramp-capacity-6 = ÔČā 
ramp-capacity-7 = ÔČĀ 
ramp-capacity-8 = ÔČĀ 
ramp-capacity-9 = ÔČĀ  
ramp-capacity-10 = ÔČÄ 
ramp-capacity-foreground = ${colors.foreground}  

; Only applies if <animation-charging> is used
animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 1000
animation-charging-foreground = ${colors.foreground}

; Only applies if <animation-discharging> is used
animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ
animation-discharging-framerate = 1500

; Only applies if <animation-low> is used
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values
poll-interval = 5
